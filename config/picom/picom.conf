# --- Backend (The 0.2% RAM King) ---
backend = "xrender";
vsync = true;
use-damage = true;

# --- Mixed Animation Logic ---
animations = (
    {
        # 1. SPECIAL RULE: dmenu (Slide)
        triggers = ["open", "show"];
        preset = "slide-in";
        direction = "up"; 
        duration = 0.15;
        match = "class_g = 'dmenu' || name = 'dmenu'";
    },
    {
        triggers = ["close", "hide"];
        preset = "slide-out";
        direction = "up";
        duration = 0.15;
        match = "class_g = 'dmenu' || name = 'dmenu'";
    },
    {
        # 2. DEFAULT RULE: All other apps (Appear/Disappear)
        triggers = ["open", "show"];
        preset = "appear";
        duration = 0.2;
        scale = 0.95;
        # This matches everything EXCEPT dmenu
        match = "class_g != 'dmenu' && name != 'dmenu'";
    },
    {
        triggers = ["close", "hide"];
        preset = "disappear";
        duration = 0.2;
        scale = 0.95;
        match = "class_g != 'dmenu' && name != 'dmenu'";
    }
)

# --- Clean & Premium Aesthetics ---
corner-radius = 0;
shadow = false;
fading = false;
fade-in-step = 0.08;
fade-out-step = 0.08;
