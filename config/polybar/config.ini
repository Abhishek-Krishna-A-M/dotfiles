[global/wm]
include-file = ~/.config/polybar/colors.ini
include-file = ~/.config/polybar/modules.ini
include-file = ~/.config/polybar/decor.ini

[bar/main]
width = 100%
height = 4%
offset-x = 0%
offset-y = 0%
radius = 0
fixed-center = true
;; This MUST be false so bspwm can control the bar's layer
override-redirect = false

;; This tells polybar to sit in the bspwm window stack
wm-restack = bspwm

;; If it still sits on top, try adding this:
support-for-wm = bspwm
background = ${color.background}
foreground = ${color.foreground}

line-size = 3
line-color = ${color.primary}

font-0 = "JetBrainsMono Nerd Font:style=Medium:size=10;3"
font-1 = "JetBrainsMono Nerd Font:size=16;4"

modules-left = bspwm sep xwindow
modules-center = date
modules-right = keys sep memory sep pulseaudio sep battery sep network sep
cursor-click = pointer
enable-ipc = true
