[color]
;; Matches your terminal FG / Logo (Bright & Crisp)
foreground = #ffffff
;; Near-black mountain dark from the wallpaper base
background = #000409
;; Pure white for active icons/focused workspace
primary = #ffffff
;; Warm ember glow from your st config (better than pure red)
alert = #c46464
;; Muted slate gray (for inactive icons)
disabled = #555e6b

;; Pill shades following the MOUNTAIN MIST gradient
;; Darkest silhouette (Bottom of the mountain)
shade3 = #000409
;; Mid-tone mountain (Matches the blueish mist)
shade2 = #3a4554
;; Lightest misty highlight (Matches the soft glow)
shade1 = #7a90b8
