#################################
#     PICOM (OPTIMIZED)         #
#################################

# Backend
backend = "xrender";
vsync = false;

# Transparency (keep, but cheap)
inactive-opacity = 0.90;
active-opacity = 1.0;
inactive-dim = 0.0;
detect-client-opacity = true;

# Disable animations (BIG WIN)
fading = false;

# Disable blur (BIGGEST WIN)
blur-method = "none";

# Shadows
shadow = false;

# Avoid fullscreen issues
unredir-if-possible = true;

# Exclusions
focus-exclude = [
  "class_g = 'Polybar'",
  "class_g = 'Rofi'"
];
