[color]
;; The bright, misty sky color for the bar background
background = #f2f2f2
;; Deepest charcoal from the mountain trees for text
foreground = #1a1a1a
;; Pure black for high-impact primary elements
primary = #000000
;; A bright, clear red for alerts (visible on white)
alert = #d32f2f
;; Soft silver/gray for inactive elements
disabled = #a0a0a0

;; Pill shades following the mountain gradient (dark to light)
;; Darkest silhouette pill
shade1 = #2e2e2e
;; Mid-tone mountain pill
shade2 = #555555
;; Lightest misty pill (blends into the background)
shade3 = #cccccc
